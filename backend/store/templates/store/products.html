<!DOCTYPE html>
<html>

<head>
    <title>Products</title>
</head>

<body>

<h1>Products</h1>


{% for product in products %}

<div>

    <h2>{{ product.name }}</h2>

    <p>
        Category:
        {{ product.category.name }}
    </p>

    <p>
        {{ product.description }}
    </p>

    <p>
        Price: ₹{{ product.price }}
    </p>

    <p>
        Stock: {{ product.stock }}
    </p>

</div>

<hr>

{% empty %}

<p>No products found</p>

{% endfor %}


</body>

</html>
